name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
      - claude/document-hub-app-oBeDY

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npx firebase-tools deploy --only hosting --project hhxfileindex --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
